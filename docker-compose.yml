services:
  php:
    build:
      context: .
      dockerfile: .infrastructure/docker/php/Dockerfile
      target: build-local
    secrets:
      - composer_token
    environment:
      XDEBUG_SESSION: "1"
      XDEBUG_MODE: "debug"
      XDEBUG_CONFIG: "client_host=host.docker.internal"
      PHP_IDE_CONFIG: "serverName=MyServer"
    ports:
      - "50049:9003"
    volumes:
      - ./:/var/www/html


secrets:
  composer_token:
    file: ./.composer-token.txt
